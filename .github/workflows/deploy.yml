name: Lazy Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Linode
    runs-on: ubuntu-latest
    
    steps:
    - name: Executing remote ssh commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          set -e  # <--- THE MAGIC BULLET: Aborts the script immediately if any line fails
          
          echo "🚀 Starting Deployment..."
          
          # 1. Navigate to Project
          cd ~/goldenbay
          
          # 2. Pull Latest Code (Will now abort if git fails)
          git checkout main
          git reset --hard HEAD
          git pull origin main
          
          # 3. Rebuild Frontend
          echo "🎨 Building Frontend..."
          cd frontend
          npm install --legacy-peer-deps
          npm run build
          
          # 4. Update Backend
          echo "⚙️ Updating Backend..."
          cd ../backend
          source ../env/bin/activate
          pip install -r requirements.txt
          
          # Notice we ONLY run migrate now, no makemigrations!
          python manage.py migrate
          python manage.py collectstatic --noinput
          
          # 5. Restart Services
          echo "🔄 Restarting Services..."
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl restart gunicorn
          
          # Restart Celery safely via systemd
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl daemon-reload
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl restart celery
          
          echo "✅ Deployment Complete! Site and Workers are live."